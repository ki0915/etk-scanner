  - has_permission
  - require_permission
  - authorize
  - authenticate
  - is_authenticated
  - is_authorized
  - login_required
  - permission_required

  # 입력 검증
  - validate
  - validate_input
  - sanitize
  - escape
  - clean
  - check_input
  - verify

