  - "datasette.allowed"
  - "ds.allowed"

  # Django
  - "request.user.has_perm"
  - "user.is_authenticated"

  # FastAPI
  - "get_current_user"
  - "oauth2_scheme"

  # SQLAlchemy
  - "text"          # text()로 감싸면 안전하지 않지만 의도적 사용
